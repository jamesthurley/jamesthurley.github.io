{% extends "base.html" %}

{% block content %}
<article class="{{ page.extra.content_class | default(value='') }}">
<h1 class="title">
  {{ page.title }}
</h1>
{% if page.date %}
<p class="subtitle"><strong>{{ page.date }}</strong></p>
{% endif %}
{{ page.content | safe }}
</article>
{% endblock content %}
